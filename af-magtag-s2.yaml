packages:
  common-options: !include packages/common.yaml

substitutions:
  device_name: af-magtag-s2
  friendly_name: "Adafruit Mag-Tag ESP32-S2"
  api_key: !secret af-magtag-s2-key

esphome:
  on_boot:
    priority: 800
    then:
    - component.update: epaper_display
    - wait_until:
        condition:
          and:
            - api.connected:
            - lambda: 'return id(ha_time).now().is_valid();'
        timeout: 30s
    - component.update: epaper_display

  on_shutdown:
    then:
      - logger.log: "Getting ready for sleep"
      - globals.set:
          id: wake_status
          value: '"ASLEEP"'
      - component.update: epaper_display
      - logger.log: "Sleeping in 5s"
      - delay: 5s
      - logger.log: "Sleeping now"

esp32:
  variant: ESP32S2
  flash_size: 4MB

psram:
  speed: 80MHz
  ignore_not_found: false

wifi:
  use_psram: true

i2c:
  sda: GPIO33
  scl: GPIO34
  frequency: 400kHz

spi:
  mosi_pin: GPIO35
  clk_pin: GPIO36
  miso_pin: GPIO37

safe_mode:
  id: safemode
  boot_is_good_after: 15s

button:
  - platform: template
    name: "Refresh Display"
    on_press:
      - component.update: epaper_display

globals:
  - id: stay_awake
    type: bool
    restore_value: yes
    initial_value: "true"
  - id: wake_status
    type: std::string
    restore_value: yes
    initial_value: '"Awake"'

