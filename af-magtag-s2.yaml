switch:
  - platform: template
    id: stay_awake_switch
    name: "Stay Awake"
    restore_mode: RESTORE_DEFAULT_ON
    lambda: 'return id(stay_awake);'
    turn_on_action:
#      - deep_sleep.prevent: deep_sleep_1
      - lambda: |-
          id(stay_awake) = true;
          id(wake_status) = "Awake";
      - logger.log: "Staying Awake"
      - component.update: epaper_display
    turn_off_action:
      - lambda: |-
          id(stay_awake) = false;
          id(wake_status) = "Sleepy";
      - logger.log: "Getting Sleepy"
      - component.update: epaper_display
#      - deep_sleep.allow: deep_sleep_1

power_supply:
  - id: neopixel_power
    pin:
      number: GPIO21
      inverted: true

  - id: buzzer_power
    pin:
      number: GPIO16
      # default to turning off the PA power
      mode: INPUT_PULLDOWN

light:
  - platform: esp32_rmt_led_strip
    id: neopixels
    name: "NeoPixels"
    pin: GPIO1
    power_supply: neopixel_power
    num_leds: 4
    chipset: WS2812
    rgb_order: GRB
    initial_state:
      brightness: 5%
    effects:
      - addressable_rainbow:
      - addressable_scan:
      - addressable_twinkle:
      - addressable_random_twinkle:
      - addressable_fireworks:
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config

  - platform: status_led
    id: red_led
    name: "Red LED"
    output: red_led_pin
    entity_category: config

output:
  - platform: ledc
    id: red_led_pin
    pin: GPIO13

  - platform: ledc
    power_supply: buzzer_power
    id: buzzer
    pin: GPIO17

binary_sensor:
  - platform: gpio
    id: button_boot
    pin:
      number: GPIO0
      inverted: true
      mode: INPUT_PULLUP
      ignore_strapping_warning: true
#      allow_other_uses: true
    on_click:
      then:
        - switch.toggle: stay_awake_switch
  - platform: gpio
    id: button_a
    pin:
      number: GPIO15
      inverted: true
      mode: INPUT_PULLUP
#      allow_other_uses: true
    on_press:
      then:
        - output.turn_on: buzzer
        - output.ledc.set_frequency:
            id: buzzer
            frequency: "1kHz"
        - output.set_level:
            id: buzzer
            level: "10%"
    on_release:
      then:
        - output.turn_off: buzzer
  - platform: gpio
    id: button_b
    pin:
      number: GPIO14
      inverted: true
      mode: INPUT_PULLUP
#      allow_other_uses: true
    on_press:
      then:
        - output.turn_on: buzzer
        - output.ledc.set_frequency:
            id: buzzer
            frequency: "2kHz"
        - output.set_level:
            id: buzzer
            level: "10%"
    on_release:
      then:
        - output.turn_off: buzzer
  - platform: gpio
    id: button_c
    pin:
      number: GPIO12
      inverted: true
      mode: INPUT_PULLUP
#      allow_other_uses: true
    on_press:
      then:
        - output.turn_on: buzzer
        - output.ledc.set_frequency:
            id: buzzer
            frequency: "4kHz"
        - output.set_level:
            id: buzzer
            level: "10%"
    on_release:
      then:
        - output.turn_off: buzzer
  - platform: gpio
    id: button_d
    pin:
      number: GPIO11
      inverted: true
      mode: INPUT_PULLUP
#      allow_other_uses: true
    on_press:
      then:
        - output.turn_on: buzzer
        - output.ledc.set_frequency:
            id: buzzer
            frequency: "4kHz"
        - output.set_level:
            id: buzzer
            level: "10%"
    on_release:
      then:
        - output.turn_off: buzzer

sensor:
  - platform: adc
    id: battery_voltage
    name: "Battery Voltage"
    entity_category: diagnostic
    pin: GPIO4
    accuracy_decimals: 2
    update_interval: 60s
    attenuation: auto
    filters:
