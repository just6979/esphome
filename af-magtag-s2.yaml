display:
  - platform: waveshare_epaper
    id: epaper_display
#    model: 2.90inv2
    model: 2.90inv2-r2
#    model: 2.90in-bV3
    cs_pin: GPIO8
    dc_pin: GPIO7
    reset_pin: GPIO6
    busy_pin: GPIO5
    update_interval: 60s
#    full_update_every: 1
    rotation: 270
    lambda: |-
      ESP_LOGI("display", "Updating display");
      
      int top = 0;
      int mid_y = it.get_height() / 2;
      int bottom = it.get_height();
      int left = 0;
      int mid_x = it.get_width() / 2;
      int right = it.get_width();

      int line1 = top + id(font_fancy_large).get_baseline() + 5;

      //it.print(middle, top, id(font_small), TextAlign::TOP_CENTER, "BACK YARD");
      //it.printf(left + 9, top2, id(font_fancy_large), TextAlign::TOP_LEFT, "%.1f°", id(backyard_temperature).state);
      //it.printf(right - 9, top2, id(font_fancy_large), TextAlign::TOP_RIGHT, "%.0f%%", id(backyard_humidity).state);

      it.print(mid_x, top, id(font_fancy_large), TextAlign::TOP_CENTER, "POOL");
      it.printf(mid_x, line1, id(font_fancy_xlarge), TextAlign::TOP_CENTER, "%.1f°", id(pool_temperature).state);
      
      it.strftime(left + 4, bottom, id(font_xsmall), TextAlign::BOTTOM_LEFT, "%H:%M %Y-%m-%d", id(ha_time).now());

      it.print(right - 4, bottom, id(font_xsmall), TextAlign::BOTTOM_RIGHT, id(wake_status).c_str());
