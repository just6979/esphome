substitutions:
  name: "athom-rf-ir-remote"
  friendly_name: "Athom RF-IR Remote"
#  device_description: "athom esp32 RF433 IR Remote"
#  project_name: "China Athom Technology.Athom RF IR Remote"
#  project_version: "v3.0.1"
  sntp_update_interval: 6h
  sntp_server_1: "0.pool.ntp.org"
  sntp_server_2: "1.pool.ntp.org"
  sntp_server_3: "2.pool.ntp.org"
  # valid value: ballu, coolix, daikin, daikin_arc, daikin_brc, delonghi, emmeti, fujitsu_general, gree, hitachi_ac344, hitachi_ac424, climate_ir_lg, midea_ir, mitsubishi, noblex, tcl112, toshiba, whirlpool, yashima, whynter, zhlt01, heatpumpir
  # https://esphome.io/components/climate/climate_ir/
  AC_Platform_name: "coolix"

  RF_RX_PIN: GPIO19
  RF_TX_PIN: GPIO18
  IR_RX_PIN: GPIO33
  IR_TX_PIN: GPIO25
  Button_PIN: GPIO0
  LED_PIN: GPIO27

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
#  comment: "${device_description}"
#  area: "${room}"
#  name_add_mac_suffix: true
  min_version: 2026.5.1
#  project:
#    name: "${project_name}"
#    version: "${project_version}"
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32dev
  variant: esp32
  flash_size: 8MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      # @grigi found in testing that these options resulted in better responsiveness.
      # BLE 4.2 is supported by ALL ESP32 boards that have bluetooth, the original and derivatives.
      CONFIG_BT_BLE_42_FEATURES_SUPPORTED: y
      # Extend the watchdog timeout, so the device reboots if the device appears locked up for over 10 seconds.
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "10"

preferences:
  flash_write_interval: 1min

logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  min_auth_mode: WPA2

api:
  reboot_timeout: 0s
  on_client_connected:
     - esp32_ble_tracker.start_scan:
        continuous: true
  on_client_disconnected:
    if:
      condition:
        not:
          api.connected:
      then:
        - esp32_ble_tracker.stop_scan:

ota:
  - platform: esphome

esp32_ble_tracker:
  scan_parameters:
    continuous: false

bluetooth_proxy:

time:
  - platform: homeassistant
    id: ha_time

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      id: wifi_ip
      icon: mdi:ip-network
      entity_category: diagnostic

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_rssi
    update_interval: 60s

  - platform: uptime
    name: "Uptime"
    id: uptime_s
    update_interval: 60s

  - platform: internal_temperature
    name: "System Temperature"
    id: system_temperature
    entity_category: diagnostic

  - platform: combination
    id: system_temperature_f
    type: linear
    sources:
      - source: system_temperature
        coefficient: 1.0
    filters:
      - lambda: return x * (9.0/5.0) + 32.0;
    unit_of_measurement: "°F"

remote_receiver:
  - pin:
      number: ${RF_RX_PIN}
      inverted: true
    dump: rc_switch
    tolerance: 25%
    id: rf_receiver

  - pin:
      number: ${IR_RX_PIN}
      inverted: true
    dump: all
    tolerance: 25%
    id: ir_receiver

remote_transmitter:
  - pin:
      number: ${RF_TX_PIN}
    # OOK modulation for RF433 — keep duty at 100%
    carrier_duty_percent: 100%
    non_blocking: true
    id: rf_transmitter

  - pin:
      number: ${IR_TX_PIN}
      inverted: false
    carrier_duty_percent: 50%
    non_blocking: true
    id: ir_transmitter

infrared:
  - platform: ir_rf_proxy
    name: IR Proxy Transmitter
    id: ir_proxy_transmitter
    remote_transmitter_id: ir_transmitter

  - platform: ir_rf_proxy
    name: IR Proxy Receiver
    id: ir_proxy_receiver
    receiver_frequency: 38kHz
    remote_receiver_id: ir_receiver

  # RF transmitter instance
radio_frequency:
  - platform: ir_rf_proxy
    name: 433MHz RF Transmitter
    id: rf_proxy_transmitter
    frequency: 433.92MHz
    remote_transmitter_id: rf_transmitter

  - platform: ir_rf_proxy
    name: 433MHz RF Receiver
    id: rf_proxy_receiver
    frequency: 433.92MHz
    remote_receiver_id: rf_receiver

climate:
  - platform: ${AC_Platform_name}
    transmitter_id: ir_transmitter
    name: "AC"
    receiver_id: ir_receiver

binary_sensor:
  - platform: gpio
    pin:
      number: ${Button_PIN}
      mode:
        input: true
      inverted: true
      ignore_strapping_warning: true
    name: "Button"
    disabled_by_default: true
    on_multi_click:
      - timing:
          - ON for at least 4s
        then:
          - button.press: Reset

button:
  - platform: restart
    name: "Restart"
    entity_category: diagnostic

  - platform: factory_reset
    name: "Factory Reset"
    id: Reset
    entity_category: diagnostic

  - platform: safe_mode
    name: "Safe Mode"
    internal: false
    entity_category: diagnostic

light:
  - platform: status_led
    name: "Status LED"
    pin: ${LED_PIN}
    entity_category: diagnostic
