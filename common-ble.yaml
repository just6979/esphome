packages:
  common-options: !include common.yaml

# Wi-Fi connects faster with bluetooth scanning off, so wait for a connection before scanning
api:
  on_client_connected:
    - esp32_ble_tracker.start_scan:
        continuous: true
  on_client_disconnected:
    - esp32_ble_tracker.stop_scan:

esp32_ble_tracker:
  # for the tweak above
  scan_parameters:
    continuous: false

bluetooth_proxy:

script:
  - id: !extend ble_start_scan
    then:
      - esp32_ble_tracker.start_scan:
          continuous: true
  - id: !extend ble_stop_scan
    then:
      - esp32_ble_tracker.stop_scan:
