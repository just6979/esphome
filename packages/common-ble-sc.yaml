packages:
  common-options: !include common.yaml

# on some single-core SoCs, Wi-Fi connects faster with bluetooth scanning off,
# so only scan when the native HA API is connected
api:
  on_client_connected:
    - script.execute: ble_start_scan
  on_client_disconnected:
    - if:
        condition:
          not:
            api.connected:
        then:
          - script.execute: ble_stop_scan

esp32_ble_tracker:
  # don't scan at start up, for the speed tweak above
  scan_parameters:
    continuous: false

bluetooth_proxy:

# override/extend here to actually en/dis-able BLE scanning
script:
  - id: !extend ble_start_scan
    then:
      - logger.log: "ENabling BLE Scans"
      - esp32_ble_tracker.start_scan:
          continuous: true
  - id: !extend ble_stop_scan
    then:
      - logger.log: "DISabling BLE Scans"
      - esp32_ble_tracker.stop_scan:
