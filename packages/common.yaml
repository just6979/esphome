esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2026.6.2

esp32:
  framework:
    type: esp-idf
  toolchain: esp-idf

logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  min_auth_mode: WPA2

api:
  id: api_id
  encryption:
    key: ${api_key}

ota:
  - platform: esphome
    password: ${ota_key}

time:
  - platform: homeassistant
    id: ha_time

button:
  - platform: restart
    name: Restart
    entity_category: diagnostic

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      id: wifi_ip
      icon: mdi:ip-network

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_rssi
    update_interval: 60s

  - platform: uptime
    name: "Uptime"
    id: uptime_s
    update_interval: 60s

  - platform: internal_temperature
    name: "System Temperature"
    id: system_temperature
    entity_category: diagnostic

  - platform: combination
    id: system_temperature_f
    type: linear
    sources:
      - source: system_temperature
        coefficient: 1.0
    filters:
      - lambda: return x * (9.0/5.0) + 32.0;
    unit_of_measurement: "°F"

script:
  - id: ble_start_scan
    then:
  - id: ble_stop_scan
    then:
