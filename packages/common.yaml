esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2026.5.0
  platformio_options:
    upload_speed: 2000000
  environment_variables:
    PLATFORMIO_BUILD_CACHE_DIR: ".pio/build-cache"

esp32:
  framework:
    type: esp-idf
  toolchain: esp-idf

logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  min_auth_mode: WPA2

api:
  id: api_id
  encryption:
    key: ${api_key}

ota:
  - platform: esphome
    password: ${ota_key}

time:
  - platform: homeassistant
    id: ha_time

button:
  - platform: restart
    name: Restart

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_rssi
    update_interval: 60s

  - platform: uptime
    name: "Uptime"
    id: uptime_s
    update_interval: 60s

script:
  - id: ble_start_scan
    then:
  - id: ble_stop_scan
    then:
