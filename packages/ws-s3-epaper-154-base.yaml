spi:
  - id: spi_display
    clk_pin: GPIO12
    mosi_pin: GPIO13

#  - id: spi_sdcard
#    clk_pin: GPIO39
#    miso_pin: GPIO40
#    mosi_pin: GPIO41

display:
  - platform: waveshare_epaper
    id: epaper_display
    spi_id: spi_display
    cs_pin: GPIO11
    dc_pin: GPIO10
    reset_pin: GPIO9
    busy_pin: GPIO8
    model: 1.54inv2
    # update the display automatically when staying awake
    update_interval: 15min
    full_update_every: 1
    rotation: 90
    lambda: |-
      id(epd_power).turn_on();
      int bot2 = 180;
      int bot1 = 200;
      int left = 0;
      int middle = 100;
      int right = 200;

      it.fill(COLOR_OFF);

      it.print(middle, middle, id(font_xxlarge), COLOR_ON, TextAlign::CENTER, "Hello");

      if (id(ha_time).now().is_valid()) {
        it.strftime(left, bot2, id(font_small), COLOR_ON, TextAlign::BOTTOM_LEFT, "%H:%M", id(ha_time).now());
        it.strftime(left, bot1, id(font_small), COLOR_ON, TextAlign::BOTTOM_LEFT, "%Y-%m-%d", id(ha_time).now());
      } else {
        it.print(left, bot2, id(font_small), COLOR_ON, TextAlign::BOTTOM_LEFT, "?Time?");
        it.print(left, bot1, id(font_small), COLOR_ON, TextAlign::BOTTOM_LEFT, "?Date?");
      }

      it.print(right, bot1, id(font_small), COLOR_ON, TextAlign::BOTTOM_RIGHT, id(wake_status).c_str());
      id(epd_power).turn_off();
