substitutions:
  device_name: pm-plasma-w-rp2350
  friendly_name: "Pimoroni Plasma 2350 W"
  api_key: !secret pm-plasma-w-rp2350-key

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2026.6.0
  platformio_options:
    upload_speed: 2000000
  environment_variables:
    PLATFORMIO_BUILD_CACHE_DIR: ".pio/build-cache"

rp2:
  variant: RP2350

logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

api:
  encryption:
    key: ${api_key}

ota:
  - platform: esphome

rp2040_ble:

time:
  - platform: homeassistant
    id: ha_time

button:
  - platform: restart
    name: Restart
    entity_category: diagnostic

i2c:
  sda: 20
  scl: 21
  frequency: 100kHz

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      id: wifi_ip
      icon: mdi:ip-network

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_rssi
    update_interval: 60s

  - platform: uptime
    name: "Uptime"
    id: uptime_s
    update_interval: 60s

  - platform: internal_temperature
    name: "System Temperature"
    id: system_temperature
    entity_category: diagnostic

  - platform: combination
    id: system_temperature_f
    type: linear
    sources:
      - source: system_temperature
        coefficient: 1.0
    filters:
      - lambda: return x * (9.0/5.0) + 32.0;
    unit_of_measurement: "°F"

#  - platform: adc
#    pin: TEMPERATURE
#    name: "Core Temperature"
#    unit_of_measurement: "°C"
#    filters:
#      - lambda: return 27 - (x - 0.706f) / 0.001721f;

binary_sensor:
  - platform: gpio
    name: "Boot button"
    pin: GPIO22
    id: boot_button
  
  - platform: gpio
    name: "A button"
    pin: GPIO12
    id: a_button

light:
  - platform: rp2040_pio_led_strip
    pin: GPIO14
    id: led_strand_1
    chipset: WS2812
    num_leds: 30
    pio: "0"
    rgb_order: BGR

  - platform: rp2040_pio_led_strip
    pin: GPIO15
    id: led_strand_2
    chipset: WS2812
    num_leds: 30
    pio: "0"
    rgb_order: BGR

  - platform: rgb
    red: output_red
    green: output_green
    blue: output_blue
    id: light_rgb_1

output:
  - platform: rp2040_pwm
    pin: GPIO16
    id: output_red

  - platform: rp2040_pwm
    pin: GPIO17
    id: output_green
  
  - platform: rp2040_pwm
    pin: GPIO18
    id: output_blue
