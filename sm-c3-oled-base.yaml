esphome:
  name: ${dev_name}
  friendly_name: ${friendly_name}

esp32:
  variant: ESP32C3
  framework:
    type: esp-idf
  flash_size: 4MB
  cpu_frequency: 80MHz

logger:
  level: DEBUG

api:
  # encryption:
  #   key: ""
  on_client_connected:
    - esp32_ble_tracker.start_scan:
        continuous: true
  on_client_disconnected:
    - esp32_ble_tracker.stop_scan:

ota:
  - platform: esphome
  # password: ""

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: ${friendly_name}
    password: !secret wifi_ap_password
  fast_connect: true

web_server:
  ota: false
  local: true

captive_portal:

button:
  - platform: restart
    name: Restart

esp32_ble_tracker:
  scan_parameters:
    continuous: false

bluetooth_proxy:
  connection_slots: 3
  active: true

i2c:
  sda: GPIO5
  scl: GPIO6
  scan: True

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Uptime"
    id: uptime_s
    update_interval: 60s

  - platform: bme280_i2c
    address: 0x76
    update_interval: 60s
    temperature:
      name: "Temperature"
      id: bme_temp
    humidity:
      name: "Humidity"
      id: bme_hum
    pressure:
      name: "Pressure"
      id: bme_pres

light:
  - platform: status_led
    name: "Blue LED"
    id: light_status
    pin:
      number: GPIO08
      inverted: true
      ignore_strapping_warning: true

font:
  - file: "gfonts://Roboto"
    id: roboto
    size: 11

display:
  - platform: ssd1306_i2c
    model: "SSD1306 72x40"
    update_interval: 0.5s
    address: 0x3C
    contrast: 70%
    rotation: 180
    lambda: |-
      it.printf(0, 0, id(roboto),  "T: %.1f° F", (id(bme_temp).state * 9 / 5) + 32);
      it.printf(0, 13, id(roboto), "H: %.1f%% rh", id(bme_hum).state);
      it.printf(0, 26, id(roboto), "P: %.1f mb", id(bme_pres).state);

