packages:
  common-options: !include packages/common-ble-singlecore.yaml

substitutions:
  device_name: ws-c6-geek
  friendly_name: "Waveshare ESP32-C6 Geek"
  api_key: !secret ws-c6-geek-key

esphome:
  on_boot:
    priority: -100
    then:
      - light.turn_on:
          id: lcd_backlight
          brightness: 75%

esp32:
  variant: ESP32C6
  flash_size: 16MB

i2c:
  sda: GPIO7
  scl:
    number: GPIO8
    ignore_strapping_warning: true
  scan: True
  frequency: 400kHz

spi:
  clk_pin: GPIO1
  mosi_pin: GPIO2

# Backlight via LEDC PWM (allows brightness control)
output:
  - platform: ledc
    pin: GPIO6
    id: backlight_pin

light:
  - platform: monochromatic
    output: backlight_pin
    name: "Display Backlight"
    disabled_by_default: true
    id: lcd_backlight
    icon: mdi:brightness-7
    restore_mode: RESTORE_AND_ON

sensor:
  - platform: bme280_i2c
    address: 0x76
    update_interval: 60s
    temperature:
     name: "Temperature"
     id: bme_temp
    humidity:
     name: "Humidity"
     id: bme_hum
    pressure:
     name: "Pressure"
     id: bme_pres

  - platform: homeassistant
    id: backyard_temp
    entity_id: sensor.backyard_temperature

  - platform: homeassistant
    id: backyard_hum
    entity_id: sensor.backyard_humidity

  - platform: homeassistant
    id: pool_temperature
    entity_id: sensor.outside_pool_temperature

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      id: wifi_ip
    ssid:
      name: "Connected SSID"
      id: wifi_ssid

#  - platform: homeassistant
#    id: ha_datetime
#    name: "HA Datetime"
#    entity_id: sensor.date_time

# The Onboard Button (GPIO 9, active-low).
# Pressing it cycles through the available pages.
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO9
      inverted: true
      mode: INPUT_PULLUP
      ignore_strapping_warning: true
    id: button1
    on_press:
      then:
        - display.page.show_next: lcd
        - component.update: lcd

color:
  - id: color_white
    red: 100%
    green: 100%
    blue: 100%
  - id: color_light_grey
    red: 75%
    green: 75%
    blue: 75%
  - id: color_grey
    red: 50%
    green: 50%
    blue: 50%
  - id: color_dark_grey
    red: 25%
    green: 25%
    blue: 25%
  - id: color_black
    red: 0%
    green: 0%
    blue: 0%
  - id: color_red
    red: 100%
  - id: color_green
    green: 100%
  - id: color_blue
    blue: 100%
  - id: color_yellow
    red: 100%
    green: 100%
  - id: color_orange
    red: 100%
    green: 64.7%
    blue: 0%

font:
  - file:
      type: gfonts
      family: Stick No Bills
      weight: 600
    id: font_xlarge
    size: 48
  - file: "gfonts://Roboto"
    id: font_medium
    size: 20
  - file: "gfonts://Roboto"
    id: font_small
    size: 14

# ST7789 — 1.14" 135×240 (Waveshare ESP32-C6-GEEK)
# Using "Custom" model so we can set the exact offsets for this panel.
# ST7789 controller is 240×320; our panel is 135×240.
# Portrait gaps: col 52|135|53 = 240, row 40|240|40 = 320
display:
  - platform: mipi_spi
    model: st7789v
    id: lcd
    dimensions:
      width: 135
      height: 240
      offset_width: 52
      offset_height: 40
    invert_colors: true
    dc_pin: GPIO3
    reset_pin:
      number: GPIO4
      ignore_strapping_warning: true
    cs_pin:
      number: GPIO5
      ignore_strapping_warning: true
    data_rate: 40MHz
    update_interval: 10s
    pages:
      - id: page_pool
        lambda: |-
          const int middle = 67;
          const int line1 = 3;
          const int line2 = 30;
          const int line3 = 47;
          const int line5 = 113;
          const int line6 = 140;
          const int line7 = 165;
          const int right1 = 120;
          const int bottom1 = 230;

          it.fill(id(color_black));

          if (id(api_id).is_connected()) {
            it.print(middle, line1, id(font_xlarge), id(color_blue), TextAlign::TOP_CENTER, "Pool");
            it.printf(middle, line3, id(font_xlarge), id(color_blue), TextAlign::TOP_CENTER, "%.1f°", id(pool_temperature).state);

            it.printf(middle, line5, id(font_medium), id(color_green), TextAlign::TOP_CENTER, "Backyard");
            it.printf(middle, line6, id(font_medium), id(color_light_grey), TextAlign::TOP_CENTER, "%.0f°F", id(backyard_temp).state);
            it.printf(middle, line7, id(font_medium), id(color_light_grey), TextAlign::TOP_CENTER, "%.0f%%", id(backyard_hum).state);
          } else {
            it.print(middle, line3, id(font_medium), id(color_orange), TextAlign::TOP_CENTER, "Connecting...");
          }

          it.printf(right1, bottom1, id(font_small), id(color_dark_grey), TextAlign::BOTTOM_RIGHT, "Pg 1 / 3");

      - id: page_climate
        lambda: |-
          const int middle = 67;
          const int line1 = 3;
          const int line2 = 30;
          const int line3 = 55;
          const int line4 = 80;
          const int line5 = 113;
          const int line6 = 140;
          const int line7 = 165;
          const int right1 = 120;
          const int bottom1 = 230;
          
          float temp_fht = (id(bme_temp).state * 9 / 5) + 32;
          float hum = id(bme_hum).state;
          float pres = id(bme_pres).state;
          ESP_LOGD("sensors", "T: %.1f  H: %.1f%% rh  P: %.1f mb", temp_fht, hum, pres);

          it.fill(id(color_black));

          it.printf(middle, line1, id(font_medium), id(color_orange), TextAlign::TOP_CENTER, "Indoors");
          it.printf(middle, line2, id(font_medium), id(color_light_grey), TextAlign::TOP_CENTER, "%.0f°F", temp_fht);
          it.printf(middle, line3, id(font_medium), id(color_light_grey), TextAlign::TOP_CENTER, "%.0f%%", hum);
          it.printf(middle, line4, id(font_medium), id(color_light_grey), TextAlign::TOP_CENTER, "%.0f mb", pres);

          if (id(api_id).is_connected()) {
            it.printf(middle, line5, id(font_medium), id(color_green), TextAlign::TOP_CENTER, "Backyard");
            it.printf(middle, line6, id(font_medium), id(color_light_grey), TextAlign::TOP_CENTER, "%.0f°F", id(backyard_temp).state);
            it.printf(middle, line7, id(font_medium), id(color_light_grey), TextAlign::TOP_CENTER, "%.0f%%", id(backyard_hum).state);
          } else {
            it.print(middle, line5, id(font_medium), id(color_orange), TextAlign::TOP_CENTER, "Connecting...");
          }

          it.printf(right1, bottom1, id(font_small), id(color_dark_grey), TextAlign::BOTTOM_RIGHT, "Pg 2 / 3");

      - id: page_status
        lambda: |-
          const int middle = 67;
          const int line1 = 3;
          const int line2 = 30;
          const int line3 = 55;
          const int line4 = 80;
          const int line5 = 113;
          const int line6 = 140;
          const int line7 = 165;
          const int right1 = 120;
          const int bottom1 = 230;

          it.fill(id(color_black));

          it.print(middle, line1, id(font_medium), id(color_orange), TextAlign::TOP_CENTER, "Network");

          if (id(api_id).is_connected()) {
            it.printf(middle, line2, id(font_medium), id(color_white), TextAlign::TOP_CENTER, "%s", id(wifi_ssid).state.c_str());
            it.printf(middle, line3, id(font_medium), id(color_green), TextAlign::TOP_CENTER, "%s", id(wifi_ip).state.c_str());
            it.printf(middle, line4, id(font_medium), id(color_yellow), TextAlign::TOP_CENTER, "%.0f dBm", id(wifi_rssi).state);
          } else {
            it.print(middle, line2, id(font_medium), id(color_orange), TextAlign::TOP_CENTER, "Connecting...");
          }

          it.print(middle, line5, id(font_medium), id(color_green), TextAlign::TOP_CENTER, "System");
          it.printf(middle, line6, id(font_medium), id(color_white), TextAlign::TOP_CENTER, "%d KB Free", esp_get_free_heap_size() / 1024);
          it.printf(middle, line7, id(font_medium), id(color_blue), TextAlign::TOP_CENTER, "%.0fs Uptime", id(uptime_s).state);

          it.printf(right1, bottom1, id(font_small), id(color_dark_grey), TextAlign::BOTTOM_RIGHT, "Pg 2 / 3");
