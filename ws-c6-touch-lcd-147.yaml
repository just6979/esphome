substitutions:
  device_name: ws-c6-touch-lcd-147
  friendly_name: "Waveshare ESP32-C6 Touch LCD 1.47"
  api_key: !secret ws-c6-touch-lcd-147-key

esphome:
  on_boot:
    priority: -100
    then:
      - switch.turn_on: screen_switch

esp32:
  variant: ESP32C6
  flash_size: 8MB

time:
  - platform: homeassistant
    id: ha_time
    timezone: America/New_York

color:
  - id: color_white
    hex: 'FFFFFF'
  - id: color_black
    hex: '000000'
  - id: color_blue
    hex: '0000FF'
  - id: color_green
    hex: '00FF00'
  - id: color_gray
    hex: 'C6C6C6'
  - id: color_red
    hex: 'FF0000'
  - id: color_orange
    hex: 'F5C77E'
  - id: color_cyan
    hex: '00FFFF'
  - id: color_yellow
    hex: 'FFFF00'
  - id: color_purple
    hex: 'A020F0'

globals:
  - id: last_touch_x
    type: int
    restore_value: no
    initial_value: '0'
  - id: last_touch_y
    type: int
    restore_value: no
    initial_value: '0'
  - id: touch_start_time
    type: unsigned long
    restore_value: no
    initial_value: '0'
  - id: is_touching
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: last_touch_type
    type: std::string
    restore_value: no
    initial_value: '"None"'
  - id: last_slide_direction
    type: std::string
    restore_value: no
    initial_value: '"None"'
  - id: touch_start_x
    type: int
    restore_value: no
    initial_value: '0'
  - id: touch_start_y
    type: int
    restore_value: no
    initial_value: '0'


