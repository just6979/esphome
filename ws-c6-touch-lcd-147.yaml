    ssid:
      name: "WiFi SSID"
      id: wifi_ssid

    ip_address:
      name: "WiFi IP"
      id: wifi_ip

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO9
      inverted: true
      mode: INPUT_PULLUP
      ignore_strapping_warning: true
    name: "Button"
    id: button1

i2c:
  sda: GPIO18
  scl: GPIO19
  scan: True
  frequency: 400kHz

