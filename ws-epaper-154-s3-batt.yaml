packages:
  common-options: !include packages/common.yaml
  ws-s3-epaper: !include packages/ws-epaper-154-s3-base.yaml

substitutions:
  device_name: ws-epaper-154-s3-batt
  friendly_name: "Waveshare ePaper 1.54 ESP32-S3 Battery"
  api_key: !secret ws-epaper-154-s3-key

globals:
  - id: !extend stay_awake
    initial_value: "false"

esp32:
  cpu_frequency: 80MHz

sensor:
  - platform: adc
    id: battery_voltage
    name: "Battery Voltage"
    pin: GPIO4
    accuracy_decimals: 2
    attenuation: auto
    filters:
      - multiply: 2.0

display:
  - id: !extend epaper_display
    lambda: |-
      id(epd_power).turn_on();
      int top1 = 0;
      int top2 = 20;
      int top3 = 50;
      int top4 = 90;
      int bot3 = 160;
      int bot2 = 180;
      int bot1 = 200;
      int left = 0;
      int middle = 100;
      int right = 200;

      it.fill(COLOR_OFF);

      it.print(middle, top1, id(font_small), COLOR_ON, TextAlign::TOP_CENTER, "Back Yard");
      it.printf(left + 10, top2, id(font_medium), COLOR_ON, TextAlign::TOP_LEFT, "%.1f° F", id(outside_temperature).state);
      it.printf(right - 10, top2, id(font_medium), COLOR_ON, TextAlign::TOP_RIGHT, "%.0f%% RH", id(outside_humidity).state);
      
      it.print(middle, top3, id(font_fancy_large), COLOR_ON, TextAlign::TOP_CENTER, "Pool");
      it.printf(middle, top4, id(font_fancy_xxlarge), COLOR_ON, TextAlign::TOP_CENTER, "%.1f° F", id(pool_temperature).state);

      if (id(ha_time).now().is_valid()) {
        it.strftime(left, bot2, id(font_xsmall), COLOR_ON, TextAlign::BOTTOM_LEFT, "%H:%M", id(ha_time).now());
        it.strftime(left, bot1, id(font_xsmall), COLOR_ON, TextAlign::BOTTOM_LEFT, "%Y-%m-%d", id(ha_time).now());
      } else {
        it.print(left, bot2, id(font_xsmall), COLOR_ON, TextAlign::BOTTOM_LEFT, "?Time?");
        it.print(left, bot1, id(font_xsmall), COLOR_ON, TextAlign::BOTTOM_LEFT, "?Date?");
      }

      it.print(right, bot3, id(font_xsmall), COLOR_ON, TextAlign::BOTTOM_RIGHT, id(wake_status).c_str());
      if (id(battery_voltage).has_state()) {
        float v = id(battery_voltage).state;
        it.printf(right, bot2, id(font_xsmall), COLOR_ON, TextAlign::BOTTOM_RIGHT, "%.2f V", v);
        // Map 3.2V (0%) to 4.1V (100%)
        float bat_min = 3.2;
        float bat_max = 4.1;
        int bat_pct = (int)((v - bat_min) / (bat_max - bat_min) * 100.0);
        // Show "LOW%" if 10% or under, otherwise show normal percentage
        if (bat_pct <= 10) {
          it.print(right, bot1, id(font_xsmall), COLOR_ON, TextAlign::BOTTOM_RIGHT, "LOW%");
        } else {
          it.printf(right, bot1, id(font_xsmall), COLOR_ON, TextAlign::BOTTOM_RIGHT, "%d%%", bat_pct);
        }
      } else {
        it.print(right, bot2, id(font_xsmall), COLOR_ON, TextAlign::BOTTOM_RIGHT, "?.??V");
        it.print(right, bot1, id(font_xsmall), COLOR_ON, TextAlign::BOTTOM_RIGHT, "??%");
      }
      id(epd_power).turn_off();
