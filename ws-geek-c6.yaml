substitutions:
  friendly_name: "Waveshare Geek ESP32-C6"

  platformio_options:
    upload_speed: 2000000

esphome:
  name: ws-geek-c6
  friendly_name: ${friendly_name}
  on_boot:
    priority: -100
    then:
      - light.turn_on:
          id: lcd_backlight
          brightness: 75%

esp32:
  variant: esp32c6
  framework:
    type: esp-idf
  flash_size: 16MB

logger:
  level: DEBUG

api:
  encryption:
    key: !secret ws-geek-c6-key
  on_client_connected:
    - esp32_ble_tracker.start_scan:
        continuous: true
  on_client_disconnected:
    - esp32_ble_tracker.stop_scan:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

button:
  - platform: restart
    name: Restart

esp32_ble_tracker:
  scan_parameters:
    continuous: false

bluetooth_proxy:
  connection_slots: 3
  active: true

i2c:
  sda: GPIO7
  scl:
    number: GPIO8
    ignore_strapping_warning: true
  scan: True
  frequency: 400kHz

# ─────────────────────────────────────────────────────
# SPI Bus for the LCD
# Pin mapping (from Waveshare ESP-IDF demo & confirmed
# with CircuitPython on the actual hardware):
#   SCLK = GPIO1    MOSI = GPIO2    DC  = GPIO3
#   RST  = GPIO4    CS   = GPIO5    BL  = GPIO6
#   BTN  = GPIO9
# ─────────────────────────────────────────────────────
spi:
  clk_pin: GPIO1
  mosi_pin: GPIO2

# Backlight via LEDC PWM (allows brightness control)
output:
  - platform: ledc
    pin: GPIO6
    id: backlight_pin

light:
  - platform: monochromatic
    output: backlight_pin
    name: "Display Backlight"
    id: lcd_backlight
    icon: mdi:brightness-7
    restore_mode: RESTORE_AND_ON

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_rssi
    update_interval: 10s

  - platform: uptime
    name: "Uptime"
    id: uptime_s
    update_interval: 10s

  - platform: bme280_i2c
    address: 0x76
    update_interval: 60s
    temperature:
     name: "Temperature"
     id: bme_temp
    humidity:
     name: "Humidity"
     id: bme_hum
    pressure:
     name: "Pressure"
     id: bme_pres

#  - platform: homeassistant
#    id: indoor_temp
#    entity_id: sensor.zone_1_thermostat_current_temperature
#
#  - platform: homeassistant
#    id: indoor_hum
#    entity_id: sensor.zone_1_thermostat_current_humidity

  - platform: homeassistant
    id: backyard_temp
    entity_id: sensor.backyard_temperature

  - platform: homeassistant
    id: backyard_hum
    entity_id: sensor.backyard_humidity

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      id: wifi_ip
    ssid:
      name: "Connected SSID"
      id: wifi_ssid

#  - platform: homeassistant
#    id: ha_datetime
#    name: "HA Datetime"
#    entity_id: sensor.date_time

# The Onboard Button (GPIO 9, active-low).
# Pressing it cycles through the available pages.
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO9
      inverted: true
      mode: INPUT_PULLUP
      ignore_strapping_warning: true
    name: "Button"
    id: button1
    on_press:
      then:
        - display.page.show_next: geek_display
        - component.update: geek_display

color:
  - id: color_white
    red: 100%
    green: 100%
    blue: 100%
  - id: color_light_grey
    red: 75%
    green: 75%
    blue: 75%
  - id: color_grey
    red: 50%
    green: 50%
    blue: 50%
  - id: color_dark_grey
    red: 25%
    green: 25%
    blue: 25%
  - id: color_black
    red: 0%
    green: 0%
    blue: 0%
  - id: color_red
    red: 100%
  - id: color_green
    green: 100%
  - id: color_blue
    blue: 100%
  - id: color_yellow
    red: 100%
    green: 100%
  - id: color_orange
    red: 100%
    green: 64.7%
    blue: 0%
  - id: color_bg_blue
    blue: 25%

font:
  - file: "gfonts://Roboto"
    id: font_large
    size: 20
  - file: "gfonts://Roboto"
    id: font_small
    size: 14

# ST7789 — 1.14" 135×240 (Waveshare ESP32-C6-GEEK)
# Using "Custom" model so we can set the exact offsets for this panel.
# ST7789 controller is 240×320; our panel is 135×240.
# Portrait gaps: col 52|135|53 = 240, row 40|240|40 = 320
display:
  - platform: st7789v
    model: Custom
    id: geek_display
    width: 135
    height: 240
    offset_width: 52
    offset_height: 40
    dc_pin: GPIO3
    reset_pin:
      number: GPIO4
      ignore_strapping_warning: true
    cs_pin:
      number: GPIO5
      ignore_strapping_warning: true
    backlight_pin: no        # controlled separately via LEDC light
    data_rate: 40MHz
    update_interval: 10s
    pages:
      - id: page_climate
        lambda: |-
          float temp_fht = (id(bme_temp).state * 9 / 5) + 32;
          float hum = id(bme_hum).state;
          float pres = id(bme_pres).state;
          ESP_LOGD("sensors", "T: %.1f  H: %.1f%% rh  P: %.1f mb", temp_fht, hum, pres);

          it.fill(id(color_black));

          it.printf(67, 5, id(font_large), id(color_blue), TextAlign::TOP_CENTER, "Indoors");
          it.printf(67, 30, id(font_large), id(color_light_grey), TextAlign::TOP_CENTER, "%.0f° F", temp_fht);
          it.printf(67, 55, id(font_large), id(color_light_grey), TextAlign::TOP_CENTER, "%.0f%% RH", hum);
          it.printf(67, 80, id(font_large), id(color_light_grey), TextAlign::TOP_CENTER, "%.0f mb", pres);

          it.printf(67, 115, id(font_large), id(color_blue), TextAlign::TOP_CENTER, "Backyard");
          if (id(wifi_ssid).state != "") {
            it.printf(67, 140, id(font_large), id(color_light_grey), TextAlign::TOP_CENTER, "%.0f° F", id(backyard_temp).state);
            it.printf(67, 165, id(font_large), id(color_light_grey), TextAlign::TOP_CENTER, "%.0f%% RH", id(backyard_hum).state);
          } else {
            it.print(67, 140, id(font_large), id(color_orange), TextAlign::TOP_CENTER, "Connecting...");
          }

          it.printf(120, 230, id(font_small), id(color_dark_grey), TextAlign::BOTTOM_RIGHT, "Pg 1/2");

      - id: page_status
        lambda: |-
          it.fill(id(color_bg_blue));

          it.print(67, 5, id(font_large), id(color_blue), TextAlign::TOP_CENTER, "Network");

          if (id(wifi_ssid).state != "") {
            it.printf(67, 35, id(font_small), id(color_white), TextAlign::TOP_CENTER, "%s", id(wifi_ssid).state.c_str());
            it.printf(67, 55, id(font_small), id(color_green), TextAlign::TOP_CENTER, "%s", id(wifi_ip).state.c_str());
            it.printf(67, 75, id(font_small), id(color_yellow), TextAlign::TOP_CENTER, "%.0f dBm", id(wifi_rssi).state);
          } else {
            it.print(67, 55, id(font_large), id(color_red), TextAlign::TOP_CENTER, "Connecting...");
          }

          it.print(67, 110, id(font_large), id(color_orange), TextAlign::TOP_CENTER, "System");
          it.printf(67, 140, id(font_small), id(color_white), TextAlign::TOP_CENTER, "%d KB Free", esp_get_free_heap_size() / 1024);
          it.printf(67, 160, id(font_small), id(color_green), TextAlign::TOP_CENTER, "%.0fs Uptime", id(uptime_s).state);

          it.printf(120, 230, id(font_small), id(color_dark_grey), TextAlign::BOTTOM_RIGHT, "Pg 2/2");
