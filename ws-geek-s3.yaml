packages:
  base: !include packages/ws-geek-base.yaml
  common-options: !include packages/common-ble.yaml

substitutions:
  device_name: ws-geek-s3
  friendly_name: "Waveshare Geek ESP32-S3"
  api_key: !secret ws-geek-s3-key
  backlight_pin: GPIO7
  sda_pin: GPIO16
  scl_pin: GPIO17
  clk_pin: GPIO12
  mosi_pin: GPIO11
  button_pin:
    number: GPIO0
    inverted: true
    mode: INPUT_PULLUP
    ignore_strapping_warning: true

esp32:
  variant: ESP32S3
  flash_size: 16MB

psram:
  mode: quad
  speed: 80MHz
  ignore_not_found: false

wifi:
  use_psram: true

display:
  - platform: mipi_spi
    id: !extend lcd
    model: WAVESHARE-ESP32-S3-GEEK
