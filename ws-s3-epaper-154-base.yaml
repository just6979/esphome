esphome:
  on_boot:
    priority: 800
    then:
#      - pcf85063.read_time:
      - lambda: |-
          // --- A. POWER LATCH (GPIO 17) ---
          // This board uses an "Active High" power circuit. If we don't lock 
          // GPIO 17 HIGH immediately, the battery protection cuts power.
          gpio_config_t io_conf_pwr;
          io_conf_pwr.intr_type = GPIO_INTR_DISABLE;
          io_conf_pwr.mode = GPIO_MODE_OUTPUT;
          io_conf_pwr.pin_bit_mask = (1ULL << GPIO_NUM_17);
          gpio_config(&io_conf_pwr);
          gpio_set_level(GPIO_NUM_17, 1); // Hold Power ON
          gpio_hold_en(GPIO_NUM_17);      // Lock it

          // --- B. LED UNLOCK (GPIO 3) ---
          // GPIO 3 is a JTAG (Debug) pin on the ESP32-S3. By default, the hardware 
          // locks it for debugging. We must strictly reset the pin to use it as a 
          // standard LED GPIO.
          gpio_reset_pin(GPIO_NUM_3);
          gpio_set_direction(GPIO_NUM_3, GPIO_MODE_OUTPUT);
      

      # ENABLE PERIPHERALS
#      - output.turn_on: epd_power
      - delay: 100ms # Give the screen hardware a moment to boot up

      # WAIT FOR DATA (Sensors & Time)
      # We wait up to 30s for Wifi, Home Assistant API, and Time to report valid data.
      - wait_until:
          condition:
            and:
              - api.connected:
              # Ensure we have a valid clock time from Home Assistant
              - lambda: 'return id(ha_time).now().is_valid();'
          timeout: 30s

      # Buffer delay to ensure SNTP time has fully overwritten the drifted deep-sleep clock
      - delay: 2s

      # UPDATE DISPLAY & SLEEP
      - component.update: epaper_display
  #      - delay: 30s
  #      - if:
  #          condition:
  #            lambda: 'return id(stay_awake);'
  #          then:
  #            deep_sleep.enter: deep_sleep_1

  # SHUTDOWN SEQUENCE
  on_shutdown:
    then:
      - logger.log: "Getting ready for sleep"
      - globals.set:
          id: wake_status
          value: '"Asleep"'
      - component.update: epaper_display
      - logger.log: "Sleeping in 5s"
      - delay: 5s
      - logger.log: "Sleeping now"
      - lambda: |-
          // Maintain Power Latch until the very last millisecond
          gpio_set_level(GPIO_NUM_17, 1);
          gpio_hold_en(GPIO_NUM_17); 
          // Turn LED OFF before sleep (Active Low: 1 = OFF)
          gpio_set_level(GPIO_NUM_3, 1);

esp32:
  variant: ESP32S3
  flash_size: 8MB

psram:
  mode: octal
  speed: 80MHz
  ignore_not_found: false
  
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_psram: true

button:
  - platform: template
    name: "Refresh Display"
    on_press:
      - component.update: epaper_display

time:
  - platform: homeassistant
    id: ha_time
#    on_time_sync:
#      - pcf85063.write_time
#  - platform: pcf85063
#    id: pcf85063_time
#    update_interval: never

light:
#  - platform: status_led
  - platform: monochromatic
    id: green_led
    name: "Green LED"
    restore_mode: RESTORE_DEFAULT_ON
    disabled_by_default: true
    output: gpio_3

output:
  - platform: ledc
    pin:
      number: GPIO3
      inverted: true
      ignore_strapping_warning: true
    id: gpio_3

  - platform: gpio
    pin: GPIO6
    id: epd_power
    inverted: false

globals:
  - id: stay_awake
    type: bool
    restore_value: yes
    initial_value: "false"
  - id: wake_status
    type: std::string
    restore_value: yes
    initial_value: '"Awake"'

switch:
#  - platform: gpio
#    id: pa_enable
#    name: "Speaker Power"
#    pin:
#      number: GPIO42
#      mode:
#        output: true
#        pulldown: true
#      inverted: true
#
#  - platform: gpio
#    id: pa_control
#    name: "Speaker Enable"
#    pin:
#      number: GPIO46
#      mode:
#        output: true
#        pullup: true
#      inverted: true
#      ignore_strapping_warning: true

  - platform: template
    id: stay_awake_switch
    name: "Stay Awake"
    restore_mode: RESTORE_DEFAULT_OFF
    lambda: |-
      if (id(stay_awake)) {
        return true;
      } else {
        return false;
      }
    turn_on_action:
      - deep_sleep.prevent: deep_sleep_1
      - lambda: |-
          id(stay_awake) = true;
          id(wake_status) = "Awake";
      - logger.log: "Staying Awake"
      - script.execute: ble_start_scan
      - component.update: epaper_display
    turn_off_action:
      - lambda: |-
          id(stay_awake) = false;
          id(wake_status) = "Sleepy";
      - logger.log: "Getting Sleepy"
      - script.execute: ble_stop_scan
      - component.update: epaper_display
      - deep_sleep.allow: deep_sleep_1

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
      mode: INPUT_PULLUP
      ignore_strapping_warning: true
      allow_other_uses: true
    id: button_light
    on_click:
      then:
        - switch.toggle: stay_awake_switch

  - platform: gpio
    pin:
      number: GPIO18
      inverted: true
      allow_other_uses: true
    id: button_power
    on_click:
      then:
        - component.update: epaper_display

deep_sleep:
  id: deep_sleep_1
  run_duration:
    default: 60s
  sleep_duration: 60min
  esp32_ext1_wakeup:
    pins:
      - number: GPIO18
        inverted: true
        mode: INPUT_PULLUP
        allow_other_uses: true
      - number: GPIO0
        inverted: true
        mode: INPUT_PULLUP
        allow_other_uses: true
        ignore_strapping_warning: true
    mode: ANY_LOW

i2c:
  sda: GPIO47
  scl: GPIO48
  scan: True
  frequency: 50kHz

sensor:
  - platform: template
    id: wakeup_cause
    accuracy_decimals: 0
    lambda: |-
      int pin;
      if (esp_sleep_get_wakeup_cause() == ESP_SLEEP_WAKEUP_EXT1) {
        pin = esp_sleep_get_ext1_wakeup_status();
        if (pin && 1) {
          id(stay_awake_switch).turn_on();
        }
        return 0;
      } else {
        return -1;
      }

  - platform: shtcx
    temperature:
      name: "Temperature"
      id: temperature
    humidity:
      name: "Humidity"
      id: humidity

  - platform: homeassistant
    id: backyard_temperature
    entity_id: sensor.backyard_temperature

  - platform: homeassistant
    id: backyard_humidity
    entity_id: sensor.backyard_humidity

  - platform: homeassistant
    id: pool_temperature
    entity_id: sensor.outside_pool_temperature

