font:
  - file: "gfonts://Roboto"
    id: roboto_20
    size: 20
  - file: "gfonts://Roboto"
    id: roboto_24
    size: 24
  - file: "gfonts://Roboto"
    id: roboto_40
    size: 40

spi:
  - id: spi_display
    clk_pin: GPIO12
    mosi_pin: GPIO13

#  - id: spi_sdcard
#    clk_pin: GPIO39
#    miso_pin: GPIO40
#    mosi_pin: GPIO41

display:
  - platform: waveshare_epaper
    id: epaper_display
    spi_id: spi_display
    cs_pin: GPIO11
    dc_pin: GPIO10
    reset_pin: GPIO9
    busy_pin: GPIO8
    model: 1.54inv2
    # update the display automatically when staying awake
    update_interval: 15min
    full_update_every: 1
    rotation: 90
    lambda: |-
      id(epd_power).turn_on();
      int top1 = 0;
      int top2 = 20;
      int top3 = 50;
      int top4 = 70;
      int bot3 = 160;
      int bot2 = 180;
      int bot1 = 200;
      int left = 0;
      int middle = 100;
      int right = 200;

      it.fill(COLOR_OFF);

      it.print(middle, top1, id(roboto_20), COLOR_ON, TextAlign::TOP_CENTER, "Back Yard");
      it.printf(left + 10, top2, id(roboto_24), COLOR_ON, TextAlign::TOP_LEFT, "%.1f°F", id(backyard_temperature).state);
      it.printf(right - 10, top2, id(roboto_24), COLOR_ON, TextAlign::TOP_RIGHT, "%.0f%%RH", id(backyard_humidity).state);
              
      it.print(middle, top3, id(roboto_24), COLOR_ON, TextAlign::TOP_CENTER, "Pool");
      it.printf(middle, top4 + 3, id(roboto_40), COLOR_ON, TextAlign::TOP_CENTER, "%.1f°F", id(pool_temperature).state);

      it.print(left, bot3, id(roboto_20), COLOR_ON, TextAlign::BOTTOM_LEFT, "Last Update");
      if (id(ha_time).now().is_valid()) {
        it.strftime(left, bot2, id(roboto_20), COLOR_ON, TextAlign::BOTTOM_LEFT, "%Y-%m-%d", id(ha_time).now());
        it.strftime(left, bot1, id(roboto_20), COLOR_ON, TextAlign::BOTTOM_LEFT, "%H:%M", id(ha_time).now());
      } else {
        it.print(left, bot2, id(roboto_20), COLOR_ON, TextAlign::BOTTOM_LEFT, "?Date?");
        it.print(left, bot1, id(roboto_20), COLOR_ON, TextAlign::BOTTOM_LEFT, "?Time?");
      }

      it.print(right, bot3, id(roboto_20), COLOR_ON, TextAlign::BOTTOM_RIGHT, id(wake_status).c_str());
      if (id(battery_voltage).has_state()) {
        float v = id(battery_voltage).state;
        it.printf(right, bot2, id(roboto_20), COLOR_ON, TextAlign::BOTTOM_RIGHT, "%.2f V", v);
        // Map 3.2V (0%) to 4.1V (100%)
        float bat_min = 3.2;
        float bat_max = 4.1;
        int bat_pct = (int)((v - bat_min) / (bat_max - bat_min) * 100.0);
        // Show "LOW%" if 10% or under, otherwise show normal percentage
        if (bat_pct <= 10) {
          it.print(right, bot1, id(roboto_20), COLOR_ON, TextAlign::BOTTOM_RIGHT, "LOW%");
        } else {
          it.printf(right, bot1, id(roboto_20), COLOR_ON, TextAlign::BOTTOM_RIGHT, "%d%%", bat_pct);
        }
      } else {
        it.print(right, bot2, id(roboto_20), COLOR_ON, TextAlign::BOTTOM_RIGHT, "?.??V");
        it.print(right, bot1, id(roboto_20), COLOR_ON, TextAlign::BOTTOM_RIGHT, "??%");
      }
      id(epd_power).turn_off();
