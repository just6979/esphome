packages:
  common-options: !include common.yaml

substitutions:
  device_name: ws-epaper-154-s3
  friendly_name: "Waveshare ePaper 1.54 ESP32-S3"
  api_key: !secret ws-tiny-epd-s3-key

esphome:
  on_boot:
    priority: 800
    then:
      - pcf85063.read_time:
      - lambda: |-
          // --- A. POWER LATCH (GPIO 17) ---
          // This board uses an "Active High" power circuit. If we don't lock 
          // GPIO 17 HIGH immediately, the battery protection cuts power.
          gpio_config_t io_conf_pwr;
          io_conf_pwr.intr_type = GPIO_INTR_DISABLE;
          io_conf_pwr.mode = GPIO_MODE_OUTPUT;
          io_conf_pwr.pin_bit_mask = (1ULL << GPIO_NUM_17);
          gpio_config(&io_conf_pwr);
          gpio_set_level(GPIO_NUM_17, 1); // Hold Power ON
          gpio_hold_en(GPIO_NUM_17);      // Lock it

          // --- B. LED UNLOCK (GPIO 3) ---
          // GPIO 3 is a JTAG (Debug) pin on the ESP32-S3. By default, the hardware 
          // locks it for debugging. We must strictly reset the pin to use it as a 
          // standard LED GPIO.
          gpio_reset_pin(GPIO_NUM_3);
          gpio_set_direction(GPIO_NUM_3, GPIO_MODE_OUTPUT);
          

      # ENABLE PERIPHERALS
      - output.turn_on: epd_power
      - delay: 100ms # Give the screen hardware a moment to boot up
      
      # WAIT FOR DATA (Sensors & Time)
      # We wait up to 30s for Wifi, Home Assistant API, and all sensors to report valid data.
      - wait_until:
          condition:
            and:
              - api.connected:
              - sensor.in_range:
                  id: frontyard_temperature
                  above: -100
              # Ensure we have a valid clock time from Home Assistant
              - lambda: 'return id(ha_time).now().is_valid();'
          timeout: 30s 
      
      # Buffer delay to ensure SNTP time has fully overwritten the drifted deep-sleep clock
      - delay: 2s 
      
      # UPDATE DISPLAY & SLEEP
      - light.turn_on: green_led
      - component.update: epaper_display
#      - delay: 30s
#      - if:
#          condition:
#            lambda: 'return id(stay_awake);'
#          then:
#            deep_sleep.enter: deep_sleep_1

  # SHUTDOWN SEQUENCE
  on_shutdown:
    then:
      - logger.log: "Getting ready for sleep"
      - globals.set:
          id: wake_status
          value: '"Asleep"'
      - component.update: epaper_display
      - logger.log: "Sleeping in 5s"
      - delay: 5s
      - logger.log: "Sleeping now"
      - lambda: |-
          // Maintain Power Latch until the very last millisecond
          gpio_set_level(GPIO_NUM_17, 1);
          gpio_hold_en(GPIO_NUM_17); 
          // Turn LED OFF before sleep (Active Low: 1 = OFF)
          gpio_set_level(GPIO_NUM_3, 1);

esp32:
  variant: ESP32S3
  flash_size: 8MB
  # run at min speed when awake since we're on battery
  cpu_frequency: 80MHz

psram:
  mode: octal
  speed: 80MHz
  ignore_not_found: false
  

ota:
  - platform: esphome
  # password: ""

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  use_psram: true

button:
  - platform: template
    name: "Refresh Display"
    on_press:
      - component.update: epaper_display


time:
  - platform: homeassistant
    id: ha_time
    on_time_sync:
      - pcf85063.write_time
  - platform: pcf85063
    id: pcf85063_time
    address: 0x51
    update_interval: never

light:
  - platform: status_led
    id: green_led
    name: "Green LED"
    disabled_by_default: true
    pin:
      number: GPIO3
      inverted: true
      ignore_strapping_warning: true

globals:
  - id: stay_awake
    type: bool
    restore_value: yes
    initial_value: "false"
  - id: wake_status
    type: std::string
    restore_value: yes
    initial_value: '"Awake"'

switch:
  - platform: template
    id: stay_awake_switch
    name: "Stay Awake"
    restore_mode: RESTORE_DEFAULT_OFF
    lambda: |-
      if (id(stay_awake)) {
        return true;
      } else {
        return false;
      }
    turn_on_action:
      - lambda: |-
          id(stay_awake) = true;
          id(wake_status) = "Awake";
      - logger.log: "Staying Awake"
      - deep_sleep.prevent: deep_sleep_1
      - component.update: epaper_display
    turn_off_action:
      - lambda: |-
          id(stay_awake) = false;
          id(wake_status) = "Sleepy";
      - logger.log: "Getting Sleepy"
      - deep_sleep.allow: deep_sleep_1
      - component.update: epaper_display

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
      mode: INPUT_PULLUP
      ignore_strapping_warning: true
      allow_other_uses: true
    id: button_light
    on_click:
      then:
        - switch.toggle: stay_awake_switch

  - platform: gpio
    pin:
      number: GPIO18
      inverted: true
      allow_other_uses: true
    id: button_power
    on_click:
      then:
        - component.update: epaper_display

deep_sleep:
  id: deep_sleep_1
  run_duration:
    default: 60s
    gpio_wakeup_reason: 60s
  sleep_duration: 60min
  esp32_ext1_wakeup:
    pins:
      - number: GPIO18
        inverted: true
        mode: INPUT_PULLUP
        allow_other_uses: true
      - number: GPIO0
        inverted: true
        mode: INPUT_PULLUP
        allow_other_uses: true
        ignore_strapping_warning: true
    mode: ANY_LOW

i2c:
  sda: GPIO47
  scl: GPIO48
  scan: True
  frequency: 50kHz

sensor:
  - platform: adc
    name: "Battery Voltage"
    pin: GPIO4
    id: battery_voltage
    accuracy_decimals: 2
    update_interval: 60s
    attenuation: auto
    filters:
      - multiply: 2.0

  - platform: shtcx
    address: 0x70
    update_interval: 60s
    temperature:
      name: "Temperature"
      id: sht_temp
    humidity:
      name: "Humidity"
      id: sht_hum

  - platform: homeassistant
    id: frontyard_temperature
    entity_id: sensor.frontyard_temperature

  - platform: homeassistant
    id: frontyard_humidity
    entity_id: sensor.frontyard_humidity

  - platform: homeassistant
    id: backyard_temperature
    entity_id: sensor.backyard_temperature

  - platform: homeassistant
    id: backyard_humidity
    entity_id: sensor.backyard_humidity

i2s_audio:
  - id: i2s_audio_bus
    i2s_lrclk_pin: GPIO38
    i2s_bclk_pin: GPIO15
    i2s_mclk_pin: GPIO14

audio_dac:
  - platform: es8311
    id: es8311_dac
    bits_per_sample: 16bit
    sample_rate: 48000

microphone:
  - platform: i2s_audio
    id: mic
    sample_rate: 16000
    i2s_din_pin:
      number: GPIO45
      ignore_strapping_warning: true
    bits_per_sample: 16bit
    adc_type: external

speaker:
  - platform: i2s_audio
    id: spkr
    i2s_dout_pin: GPIO16
    dac_type: external
    sample_rate: 48000
    bits_per_sample: 16bit
    channel: left
    audio_dac: es8311_dac
    buffer_duration: 100ms

font:
  - file: "gfonts://Roboto"
    id: roboto_16
    size: 16
  - file: "gfonts://Roboto"
    id: roboto_20
    size: 20
  - file: "gfonts://Roboto"
    id: roboto_24
    size: 24
  - file: "gfonts://Roboto"
    id: roboto_40
    size: 40
  - file: "gfonts://Roboto"
    id: roboto_60
    size: 60

spi:
  clk_pin: GPIO12
  mosi_pin: GPIO13
  interface: hardware

output:
  - platform: gpio
    pin: GPIO6
    id: epd_power
    inverted: false 

display:
  - platform: waveshare_epaper
    id: epaper_display
    cs_pin: GPIO11
    dc_pin: GPIO10
    reset_pin: GPIO9
    busy_pin: GPIO8
    model: 1.54inv2
    # update the display automatically when staying awake
    update_interval: 5min
    full_update_every: 1
    rotation: 90
    lambda: |-
      int top1 = 0;
      int top2 = 20;
      int top3 = 50;
      int top4 = 70;
      int bot3 = 150;
      int bot2 = 175;
      int bot1 = 200;
      int left = 0;
      int middle = 100;
      int right = 200;

      it.fill(COLOR_OFF);

      it.print(middle, top1, id(roboto_20), COLOR_ON, TextAlign::TOP_CENTER, "Front Yard");
      it.printf(left, top2, id(roboto_24), COLOR_ON, TextAlign::TOP_LEFT, "%.1f°F", id(frontyard_temperature).state);
      it.printf(right, top2, id(roboto_24), COLOR_ON, TextAlign::TOP_RIGHT, "%.0f%%RH", id(frontyard_humidity).state);
              
      it.print(middle, top3, id(roboto_20), COLOR_ON, TextAlign::TOP_CENTER, "Back Yard");
      it.printf(left, top4, id(roboto_24), COLOR_ON, TextAlign::TOP_LEFT, "%.1f°F", id(backyard_temperature).state);
      it.printf(right, top4, id(roboto_24), COLOR_ON, TextAlign::TOP_RIGHT, "%.0f%%RH", id(backyard_humidity).state);

      it.print(left, bot3, id(roboto_20), COLOR_ON, TextAlign::BOTTOM_LEFT, "Last Update");
      if (id(ha_time).now().is_valid()) {
        it.strftime(left, bot2, id(roboto_20), COLOR_ON, TextAlign::BOTTOM_LEFT, "%Y-%m-%d", id(ha_time).now());
        it.strftime(left, bot1, id(roboto_24), COLOR_ON, TextAlign::BOTTOM_LEFT, "%H:%M", id(ha_time).now());
      } else {
        it.print(left, bot2, id(roboto_20), COLOR_ON, TextAlign::BOTTOM_LEFT, "?Date?");
        it.print(left, bot1, id(roboto_24), COLOR_ON, TextAlign::BOTTOM_LEFT, "?Time?");
      }

      it.print(right, bot3, id(roboto_20), COLOR_ON, TextAlign::BOTTOM_RIGHT, id(wake_status).c_str());
      if (id(battery_voltage).has_state()) {
        float v = id(battery_voltage).state;
        it.printf(right, bot2, id(roboto_20), COLOR_ON, TextAlign::BOTTOM_RIGHT, "%.2f V", v);
        // Map 3.2V (0%) to 4.1V (100%)
        float bat_min = 3.2;
        float bat_max = 4.1;
        int bat_pct = (int)((v - bat_min) / (bat_max - bat_min) * 100.0);
        // Show "LOW%" if 10% or under, otherwise show normal percentage
        if (bat_pct <= 10) {
          it.print(right, bot1, id(roboto_24), COLOR_ON, TextAlign::BOTTOM_RIGHT, "LOW%");
        } else {
          it.printf(right, bot1, id(roboto_24), COLOR_ON, TextAlign::BOTTOM_RIGHT, "%d%%", bat_pct);
        }
      } else {
        it.print(right, bot2, id(roboto_20), COLOR_ON, TextAlign::BOTTOM_RIGHT, "?.??V");
        it.print(right, bot1, id(roboto_24), COLOR_ON, TextAlign::BOTTOM_RIGHT, "??%");
      }
