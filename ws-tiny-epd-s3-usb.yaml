esphome:
  name: ws-tiny-epd-s3-usb
  friendly_name: "Waveshare Tiny ePaper ESP32-S3 USB"
  
  on_boot:
    priority: 800
    then:
      - pcf85063.read_time:
      - lambda: |-
          // --- A. POWER LATCH (GPIO 17) ---
          // This board uses an "Active High" power circuit. If we don't lock 
          // GPIO 17 HIGH immediately, the battery protection cuts power.
          gpio_config_t io_conf_pwr;
          io_conf_pwr.intr_type = GPIO_INTR_DISABLE;
          io_conf_pwr.mode = GPIO_MODE_OUTPUT;
          io_conf_pwr.pin_bit_mask = (1ULL << GPIO_NUM_17);
          gpio_config(&io_conf_pwr);
          gpio_set_level(GPIO_NUM_17, 1); // Hold Power ON
          gpio_hold_en(GPIO_NUM_17);      // Lock it

          // --- B. LED UNLOCK (GPIO 3) ---
          // GPIO 3 is a JTAG (Debug) pin on the ESP32-S3. By default, the hardware 
          // locks it for debugging. We must strictly reset the pin to use it as a 
          // standard LED GPIO.
          gpio_reset_pin(GPIO_NUM_3);
          gpio_set_direction(GPIO_NUM_3, GPIO_MODE_OUTPUT);
          
          // Turn on green LED until sleep (Active Low: 0 = ON)
          gpio_set_level(GPIO_NUM_3, 0);

      # ENABLE PERIPHERALS
      - output.turn_on: epd_power
      - delay: 100ms # Give the screen hardware a moment to boot up
      
      # WAIT FOR DATA (Sensors & Time)
      # We wait up to 30s for Wifi, Home Assistant API, and all sensors to report valid data.
      - wait_until:
          condition:
            and:
              - api.connected:
              - sensor.in_range:
                  id: bme_temp
                  above: -100
              # Ensure we have a valid clock time from Home Assistant
              - lambda: 'return id(ha_time).now().is_valid();'
          timeout: 30s 
      
      # Buffer delay to ensure SNTP time has fully overwritten the drifted deep-sleep clock
      - delay: 2s 
      
      # UPDATE DISPLAY & SLEEP
      - component.update: oled_display
      # - delay: 20s
      # - deep_sleep.enter: deep_sleep_1

  # SHUTDOWN SEQUENCE
  on_shutdown:
    then:
      - lambda: |-
          // Maintain Power Latch until the very last millisecond
          gpio_set_level(GPIO_NUM_17, 1);
          gpio_hold_en(GPIO_NUM_17); 
          // Turn LED OFF before sleep (Active Low: 1 = OFF)
          gpio_set_level(GPIO_NUM_3, 1);

esp32:
  variant: ESP32S3
  framework:
    type: esp-idf
  flash_size: 8MB

psram:
  mode: octal
  speed: 80MHz
  ignore_not_found: false
  
logger:
  level: DEBUG
  
api:
  # encryption:
  #   key: ""

ota:
  - platform: esphome
  # password: ""

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Waveshare Tiny ePaper"
    password: !secret wifi_ap_password
  fast_connect: true
  use_psram: true

web_server:
  ota: false
  local: true

captive_portal:

button:
  - platform: restart
    name: "Restart"

# we're on usb power and not sleeping, so be another bluetooth proxy
esp32_ble_tracker:

bluetooth_proxy:
  connection_slots: 5
  active: true

time:
  - platform: homeassistant
    id: ha_time
    on_time_sync:
      - pcf85063.write_time
  - platform: pcf85063
    id: pcf85063_time
    address: 0x51
    update_interval: never

binary_sensor:
  - platform: gpio
    pin: GPIO0
    name: "Button 1"
    on_click:
      then:
        - component.update: oled_display

# deep_sleep:
#   id: deep_sleep_1
#   run_duration:
#     default: 30s
#     gpio_wakeup_reason: 30s
#   sleep_duration: 30min
#   wakeup_pin:
#     number: GPIO18
#     inverted: true
#     mode: INPUT_PULLUP

spi:
  clk_pin: GPIO12
  mosi_pin: GPIO13
  interface: hardware

i2c:
  sda: GPIO47
  scl: GPIO48
  scan: True

sensor:
  - platform: wifi_signal
    name: "WiFi Signal Sensor"
    update_interval: 60s

  - platform: bme280_i2c
    address: 0x76
    update_interval: 60s
    temperature:
      name: "Temperature"
      id: bme_temp
    humidity:
      name: "Humidity"
      id: bme_hum
    pressure:
      name: "Pressure"
      id: bme_pres

  - platform: adc
    pin: GPIO4
    name: "Battery Voltage"
    id: battery_voltage
    update_interval: 60s
    attenuation: auto
    filters:
      - multiply: 2.0

  # - platform: shtcx
  #   address: 0x70
  #   update_interval: 60s
  #   temperature:
  #     name: "Temperature (Internal)"
  #     id: sht_temp
  #   humidity:
  #     name: "Humidity (Internal)"
  #     id: sht_hum

font:
  - file: "gfonts://Roboto"
    id: roboto_16
    size: 16
  - file: "gfonts://Roboto"
    id: roboto_20
    size: 20
  - file: "gfonts://Roboto"
    id: roboto_24
    size: 24
  - file: "gfonts://Roboto"
    id: roboto_40
    size: 40
  - file: "gfonts://Roboto"
    id: roboto_60
    size: 60

output:
  - platform: gpio
    pin: GPIO6
    id: epd_power
    inverted: false 

display:
  - platform: waveshare_epaper
    id: oled_display
    cs_pin: GPIO11
    dc_pin: GPIO10
    reset_pin: GPIO9
    busy_pin: 
      number: GPIO8
      inverted: false
    model: 1.54inv2
    update_interval: 60s
    full_update_every: 10
    reset_duration: 10ms
    rotation: 180
    
    lambda: |-
      int top1 = 5;
      int top2 = 30;
      int top3 = 55;
      int bot1 = 195;
      int bot2 = 165;
      int bot3 = 140;
      int left = 10;
      int middle = 100;
      int right = 190;

      it.fill(COLOR_OFF);

      it.print(middle, top1, id(roboto_20), COLOR_ON, TextAlign::TOP_CENTER, "Conditions");

      if (id(bme_temp).has_state()) {
        it.printf(left, top2, id(roboto_24), COLOR_ON, TextAlign::TOP_LEFT, "%.1f°F", id(bme_temp).state * 1.8 + 32);
        it.printf(left, top3, id(roboto_24), COLOR_ON, TextAlign::TOP_LEFT, "%.1f°C", id(bme_temp).state);
      } else {
        it.print(left, top2, id(roboto_24), COLOR_ON, TextAlign::TOP_LEFT, "?Temp?");
      }
      if (id(bme_hum).has_state()) {
        it.printf(right, top2, id(roboto_24), COLOR_ON, TextAlign::TOP_RIGHT, "%.0f%%RH", id(bme_hum).state);
      } else {
        it.print(right, top2, id(roboto_24), COLOR_ON, TextAlign::TOP_LEFT, "?RelHum?");
      }

      it.print(middle, bot3, id(roboto_20), COLOR_ON, TextAlign::BOTTOM_CENTER, "Last Update");
      if (id(ha_time).now().is_valid()) {
        it.strftime(left, bot2, id(roboto_20), COLOR_ON, TextAlign::BOTTOM_LEFT, "%Y-%m-%d", id(ha_time).now());
        it.strftime(left, bot1, id(roboto_24), COLOR_ON, TextAlign::BOTTOM_LEFT, "%H:%M", id(ha_time).now());
      } else {
        it.print(left, bot2, id(roboto_24), COLOR_ON, TextAlign::BOTTOM_LEFT, "?Date?");
        it.print(left, bot1, id(roboto_24), COLOR_ON, TextAlign::BOTTOM_LEFT, "?Time?");
      }

      if (id(battery_voltage).has_state()) {
        float v = id(battery_voltage).state;
        it.printf(right, bot2, id(roboto_16), COLOR_ON, TextAlign::BOTTOM_RIGHT, "%.2f V", v);

        // Map 3.2V (0%) to 4.1V (100%)
        float bat_min = 3.2;
        float bat_max = 4.1;
        int bat_pct = (int)((v - bat_min) / (bat_max - bat_min) * 100.0);
        if (bat_pct > 100) bat_pct = 100;
        if (bat_pct < 0) bat_pct = 0;
        // Show "LOW BAT" if 10% or under, otherwise show normal percentage
        if (bat_pct <= 10) {
          it.print(right, bot1, id(roboto_24), COLOR_ON, TextAlign::BOTTOM_RIGHT, "BAT LOW");
        } else {
          it.printf(right, bot1, id(roboto_24), COLOR_ON, TextAlign::BOTTOM_RIGHT, "%d%%", bat_pct);
        }
      } else {
        it.print(right, bot2, id(roboto_24), COLOR_ON, TextAlign::BOTTOM_RIGHT, "?Volts?");
        it.print(right, bot1, id(roboto_24), COLOR_ON, TextAlign::BOTTOM_RIGHT, "?Bat%?");
      }
