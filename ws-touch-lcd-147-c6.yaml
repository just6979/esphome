packages:
  common-options: !include packages/common-ble-sc.yaml

substitutions:
  device_name: ws-touch-lcd-147-c6
  friendly_name: "Waveshare Touch LCD 1.47 ESP32-C6"
  api_key: !secret ws-touch-lcd-147-c6-key

esphome:
  on_boot:
    priority: -100
    then:
      - light.turn_on:
          id: lcd_backlight
          brightness: 75%

esp32:
  variant: ESP32C6
  flash_size: 8MB

i2c:
  sda: GPIO18
  scl: GPIO19
  frequency: 400kHz

spi:
  clk_pin: GPIO1
  mosi_pin: GPIO2

button:
  - platform: template
    name: "Next Page"
    icon: mdi:page-next
    on_press:
      then:
        - display.page.show_next: lcd
        - component.update: lcd

external_components:
  - source: github://widget/esphome-components
    components: [ axs5106 ]
    refresh: 0s
  #  - source: github://dala318/esphome-qmi8658
  #    components: [qmi8658]
  #    refresh: 5s

globals:
  - id: last_touch_x
    type: int
    restore_value: no
    initial_value: '0'
  - id: last_touch_y
    type: int
    restore_value: no
    initial_value: '0'
  - id: touch_start_time
    type: unsigned long
    restore_value: no
    initial_value: '0'
  - id: is_touching
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: last_touch_type
    type: std::string
    restore_value: no
    initial_value: '"None"'
  - id: last_slide_direction
    type: std::string
    restore_value: no
    initial_value: '"None"'
  - id: touch_start_x
    type: int
    restore_value: no
    initial_value: '0'
  - id: touch_start_y
    type: int
    restore_value: no
    initial_value: '0'

output:
