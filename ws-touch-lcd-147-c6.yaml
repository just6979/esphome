    id: lcd_backlight_pin
    pin: GPIO23

light:
  - platform: monochromatic
    output: lcd_backlight_pin
    name: "Display Backlight"
    entity_category: config
    id: lcd_backlight
    icon: mdi:brightness-7
    restore_mode: RESTORE_AND_ON

