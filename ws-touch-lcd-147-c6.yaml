text_sensor:
  - platform: wifi_info
    ssid:
      name: "WiFi SSID"
      id: wifi_ssid

    ip_address:
      name: "WiFi IP"
      id: wifi_ip

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO9
      inverted: true
      mode: INPUT_PULLUP
      ignore_strapping_warning: true
    id: button1
    on_press:
      then:
        - display.page.show_next: lcd
        - component.update: lcd

touchscreen:
  platform: axs5106
  id: my_touchscreen
  interrupt_pin: GPIO21
  reset_pin: GPIO20
  calibration:
    x_min: 0
    y_min: 0
    y_max: 320
    x_max: 172
  transform:
    mirror_y: True
  on_touch:
    - lambda: |-
        id(is_touching) = true;
        id(touch_start_time) = millis();
        id(touch_start_x) = touch.x;
        id(touch_start_y) = touch.y;
        id(last_touch_x) = touch.x;
        id(last_touch_y) = touch.y;

  on_update:
    - lambda: |-
        if (id(is_touching) && !touches.empty()) {
          id(last_touch_x) = touches[0].x;
          id(last_touch_y) = touches[0].y;
        }

  on_release:
    - display.page.show_next: lcd
    - component.update: lcd
    - lambda: |-
        id(is_touching) = false;
        unsigned long duration = millis() - id(touch_start_time);

        // Calculate movement
        int delta_x = id(last_touch_x) - id(touch_start_x);
        int delta_y = id(last_touch_y) - id(touch_start_y);

        // Total distance (Pythagorean theorem)
        float distance = sqrt(delta_x * delta_x + delta_y * delta_y);

        // Minimum threshold to consider a slide
        const float SLIDE_THRESHOLD = 20.0;

        if (distance > SLIDE_THRESHOLD) {
          // It's a slide - calculate angle
          id(last_touch_type) = "Slide";

          // Angle in degrees (0° = right, 90° = down, 180° = left, 270° = up)
          float angle_rad = atan2(delta_y, delta_x);
          float angle_deg = angle_rad * 180.0 / 3.14159265;

          // Normalize angle between 0 and 360
          if (angle_deg < 0) angle_deg += 360.0;

          // Determine direction by angle
          // Right: 315-45°, Down: 45-135°, Left: 135-225°, Up: 225-315°
          if ((angle_deg >= 315.0) || (angle_deg < 45.0)) {
            id(last_slide_direction) = "Right";
          } else if (angle_deg < 135.0) {
            id(last_slide_direction) = "Down";
          } else if (angle_deg < 225.0) {
            id(last_slide_direction) = "Left";
          } else {
            id(last_slide_direction) = "Up";
          }

          ESP_LOGI("touch", "Slide %s: distance=%.1f px, angle=%.1f°, start(%d,%d) end(%d,%d)",
                   id(last_slide_direction).c_str(), distance, angle_deg,
                   id(touch_start_x), id(touch_start_y),
                   id(last_touch_x), id(last_touch_y));
        } else {
          // It's a tap (simple press)
          id(last_slide_direction) = "None";
          if (duration < 300) {
            id(last_touch_type) = "Short press";
            ESP_LOGI("touch", "Short press at (%d,%d), duration: %lums",
                     id(last_touch_x), id(last_touch_y), duration);
          } else {
            id(last_touch_type) = "Long press";
            ESP_LOGI("touch", "Long press at (%d,%d), duration: %lums",
                     id(last_touch_x), id(last_touch_y), duration);
          }
        }

    - homeassistant.event:
        event: esphome.touch_event
        data:
          type: !lambda 'return id(last_touch_type).c_str();'
          direction: !lambda 'return id(last_slide_direction).c_str();'
          start_x: !lambda 'return id(touch_start_x);'
          start_y: !lambda 'return id(touch_start_y);'
          end_x: !lambda 'return id(last_touch_x);'
          end_y: !lambda 'return id(last_touch_y);'

color:
  - id: color_white
    hex: 'FFFFFF'
  - id: color_light_grey
    hex: 'DDDDDD'
  - id: color_grey
    hex: '808080'
  - id: color_dark_grey
    hex: '404040'
  - id: color_black
    hex: '000000'
  - id: color_red
    hex: 'FF0000'
  - id: color_orange
    hex: 'F5C77E'
  - id: color_yellow
    hex: 'FFFF00'
  - id: color_green
    hex: '00FF00'
  - id: color_cyan
    hex: '00FFFF'
  - id: color_blue
    hex: '0000FF'
  - id: color_purple
    hex: 'A020F0'

font:
  - file:
      type: gfonts
      family: Stick No Bills
      weight: 600
    id: font_xlarge
    size: 64
  - file: "gfonts://Roboto"
    id: font_medium
    size: 26
  - file: "gfonts://Roboto"
    id: font_small
    size: 16


# LCD Display (172x320 ST7789V)
display:
  - platform: mipi_spi
    model: st7789v
    id: lcd
    dc_pin:
      number: GPIO15
      ignore_strapping_warning: true
    cs_pin: GPIO14
    reset_pin: GPIO22
    dimensions:
      width: 172
      height: 320
      offset_height: 0
      offset_width: 34
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: true
    invert_colors: false
    data_rate: 40MHz
    color_order: bgr
    update_interval: 1s
    pages:
      - id: page_pool
        lambda: |-
          const int middle = 86;
          const int line1 = 5;
          const int line2 = 60;
          const int line5 = 135;
          const int line6 = 170;
          const int line7 = 205;
          const int right1 = 160;
          const int bottom1 = 310;

          it.fill(id(color_black));

          if (id(api_id).is_connected()) {
            it.print(middle, line1, id(font_xlarge), id(color_blue), TextAlign::TOP_CENTER, "Pool");
            it.printf(middle, line2, id(font_xlarge), id(color_blue), TextAlign::TOP_CENTER, "%.1f°", id(pool_temperature).state);

            it.printf(middle, line5, id(font_medium), id(color_green), TextAlign::TOP_CENTER, "Backyard");
            it.printf(middle, line6, id(font_medium), id(color_white), TextAlign::TOP_CENTER, "%.0f°F", id(backyard_temp).state);
            it.printf(middle, line7, id(font_medium), id(color_white), TextAlign::TOP_CENTER, "%.0f%%", id(backyard_hum).state);
          } else {
            it.print(middle, line5, id(font_medium), id(color_orange), TextAlign::TOP_CENTER, "Connecting...");
          }

          it.printf(right1, bottom1, id(font_small), id(color_grey), TextAlign::BOTTOM_RIGHT, "Pg 1 / 3");

      - id: page_climate
        lambda: |-
          const int middle = 86;
          const int line1 = 5;
          const int line2 = 35;
          const int line3 = 65;
          const int line4 = 95;
          const int line5 = 135;
          const int line6 = 170;
          const int line7 = 205;
          const int right1 = 160;
          const int bottom1 = 310;
          
          float temp = id(indoor_temp).state;
          float hum = id(indoor_hum).state;
          float pres = id(pressure).state;
          ESP_LOGD("sensors", "T: %.1f  H: %.1f%% rh  P: %.1f mb", temp, hum, pres);

          it.fill(id(color_black));

          it.printf(middle, line1, id(font_medium), id(color_orange), TextAlign::TOP_CENTER, "Indoors");
          it.printf(middle, line2, id(font_medium), id(color_white), TextAlign::TOP_CENTER, "%.0f° F", temp);
          it.printf(middle, line3, id(font_medium), id(color_white), TextAlign::TOP_CENTER, "%.0f%% RH", hum);
          it.printf(middle, line4, id(font_medium), id(color_white), TextAlign::TOP_CENTER, "%.0f mb", pres);

          if (id(api_id).is_connected()) {
            it.printf(middle, line5, id(font_medium), id(color_green), TextAlign::TOP_CENTER, "Backyard");
            it.printf(middle, line6, id(font_medium), id(color_white), TextAlign::TOP_CENTER, "%.0f° F", id(backyard_temp).state);
            it.printf(middle, line7, id(font_medium), id(color_white), TextAlign::TOP_CENTER, "%.0f%% RH", id(backyard_hum).state);
          } else {
            it.print(middle, line5, id(font_medium), id(color_orange), TextAlign::TOP_CENTER, "Connecting...");
          }

          it.printf(right1, bottom1, id(font_small), id(color_grey), TextAlign::BOTTOM_RIGHT, "Pg 2 / 3");

      - id: page_status
        lambda: |-
          const int middle = 86;
          const int line1 = 5;
          const int line2 = 35;
          const int line3 = 65;
          const int line4 = 95;
          const int line5 = 135;
          const int line6 = 170;
          const int line7 = 205;
          const int right1 = 160;
          const int bottom1 = 310;

          it.fill(id(color_black));

          it.print(middle, line1, id(font_medium), id(color_orange), TextAlign::TOP_CENTER, "Network");

          if (id(api_id).is_connected()) {
            it.printf(middle, line2, id(font_medium), id(color_white), TextAlign::TOP_CENTER, "%s", id(wifi_ssid).state.c_str());
            it.printf(middle, line3, id(font_medium), id(color_white), TextAlign::TOP_CENTER, "%s", id(wifi_ip).state.c_str());
            it.printf(middle, line4, id(font_medium), id(color_white), TextAlign::TOP_CENTER, "%.0f dBm", id(wifi_rssi).state);
          } else {
            it.print(middle, line2, id(font_medium), id(color_orange), TextAlign::TOP_CENTER, "Connecting...");
          }

          it.print(middle, line5, id(font_medium), id(color_green), TextAlign::TOP_CENTER, "System");
          it.printf(middle, line6, id(font_medium), id(color_white), TextAlign::TOP_CENTER, "%d KB Free", esp_get_free_heap_size() / 1024);
          it.printf(middle, line7, id(font_medium), id(color_white), TextAlign::TOP_CENTER, "%.0fs Uptime", id(uptime_s).state);

          it.printf(right1, bottom1, id(font_small), id(color_grey), TextAlign::BOTTOM_RIGHT, "Pg 2 / 3");
